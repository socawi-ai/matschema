name: Build and Publish Docker Image

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@318604b99e75e41977312d83839a89be02ca4893
        with:
          images: ghcr.io/${{ github.repository_owner }}/matschema
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha

      - name: Build image for scan
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75
        with:
          context: .
          load: true
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/matschema:scan-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Smoke test built image
        run: |
          docker run --rm \
            --entrypoint node \
            ghcr.io/${{ github.repository_owner }}/matschema:scan-${{ github.sha }} \
            -e "require('/app/src/data/store'); require('/app/src/app'); console.log('image-smoke-ok')"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/matschema:scan-${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "HIGH,CRITICAL"

      - name: Build and push
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
